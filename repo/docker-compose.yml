name: task-133

services:
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: task-133-app
    ports:
      - "8080:8080"
    environment:
      APP_HEADLESS: "true"
      API_PORT: "8080"
      DB_PATH: "/app/data/console.db"
      BACKUP_DIR: "/app/data/backups"
      LOG_DIR: "/app/logs"
      # 32-byte base64 AES-256 seed key.  Matches the ciphertext baked into
      # V2__seed_admin_user.sql so staff_id_encrypted values decrypt cleanly
      # on first boot.  Override in a real deployment with Windows DPAPI or
      # an operator-controlled key; SeedEncryptionService will re-encrypt
      # seeded rows under the new key on the next boot.
      APP_TEST_ENC_KEY: "ZWFnbGVwb2ludC1jb25zb2xlLXNlZWQta2V5LXYxISE="
    volumes:
      - console_data:/app/data
      - console_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/health"]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 8
    restart: unless-stopped

volumes:
  console_data:
  console_logs:
