name: task-133

services:
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: task-133-app
    ports:
      - "8080:8080"
    environment:
      APP_HEADLESS: "true"
      API_PORT: "8080"
      DB_PATH: "/app/data/console.db"
      BACKUP_DIR: "/app/data/backups"
      LOG_DIR: "/app/logs"
      APP_TEST_ENC_KEY: "dGVzdC1rZXktMzItYnl0ZXMtbG9uZy10ZXN0IQ=="
    volumes:
      - console_data:/app/data
      - console_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/health"]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 8
    restart: unless-stopped

volumes:
  console_data:
  console_logs:
